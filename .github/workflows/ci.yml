name: CI

on:
  push:
    branches: [main]
    paths: ['ollama/**', 'evals/**', 'scripts/**', '.claude/**', '.agents/**', '.github/workflows/ci.yml']
  pull_request:
    paths: ['ollama/**', 'evals/**', 'scripts/**', '.claude/**', '.agents/**', '.github/workflows/ci.yml']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r ollama/requirements.txt
      - name: Compile check
        run: python3 -m py_compile ollama/*.py evals/suites/perspectives/*.py
      - name: Validate fixtures and registries
        run: python3 scripts/validate_fixtures.py
      - name: Skill lint (frontmatter + fence balance)
        run: python3 scripts/lint_skills.py
      - name: Scorer smoke tests
        run: bash scripts/smoke_scorers.sh
      - name: Blind-prompt guard (answer keys + hint comments)
        run: python3 ollama/test_blind_prompts.py
      - name: Mirror drift check (strict)
        run: python3 scripts/check_mirrors.py --strict
