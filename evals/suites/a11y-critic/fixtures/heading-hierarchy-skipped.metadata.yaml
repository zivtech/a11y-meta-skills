fixture_id: heading-hierarchy-skipped
name: Blog Post with Skipped Heading Levels
description: Blog post article with h1 followed by h3 (skipping h2), and inconsistent h2 later. Heading hierarchy broken.
language: jsx
framework: React
difficulty: HAS-BUGS
domain: Content & Semantic Structure
work_type: component_review

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "Heading hierarchy skips from h1 directly to h3"
        severity: MAJOR
        wcag: "1.3.1 Info and Relationships (logical document structure)"
        evidence: "Lines 8-10: h1 'Introduction...' followed immediately by h3 'Why Accessibility...', skipping h2"
        user_group: "Screen reader users navigating by heading level (h key in NVDA/JAWS)"
        expected_behavior: "h1 should be followed by h2, then optionally h3. Skipped levels break navigation structure."
        fix: "Change the first group of h3 to h2 (lines 8, 11, 15) to create consistent h1 > h2 hierarchy"

      - description: "Inconsistent heading hierarchy (h3 then h2)"
        severity: MAJOR
        wcag: "1.3.1 Info and Relationships"
        evidence: "Line 19 (h3) followed by line 21 (h2). After using h3 for subsections, jumping back to h2 breaks hierarchy."
        user_group: "Screen reader users"
        expected_behavior: "Once h3 is used for subsections under h1, h2 should not appear later. Hierarchy must be consistent."
        fix: "Either make all subsections h2 (and promote h3 if needed), or maintain h1 > h3 if h2 is not used"

  - category: should_find
    count: 0

wcag_criteria:
  - "1.3.1 Info and Relationships (heading hierarchy and document structure)"

multi_perspective_coverage:
  - screen_reader: "CRITICAL: Screen reader users pressing 'h' to jump to next heading, or '2' to jump to next h2, encounter skipped levels. Cannot navigate page structure efficiently."
  - keyboard: "Not affected (content is readable, just hierarchy is confusing)"
  - low_vision: "Not affected (headings are visible and clear visually)"
  - cognitive: "May be confusing if heading size and level don't match expectations (visual size ≠ semantic level)"

false_positive_traps: 0

notes: |
  This is a **HAS-BUGS** fixture testing semantic structure validation.

  Expected verdict: REVISE

  The headings are semantically marked (not divs), but the hierarchy is broken. This is a realistic issue: when blog posts are written incrementally, the heading structure can become inconsistent.

  A11y-critic should:
  1. Verify all elements are semantic headings (they are)
  2. Audit the hierarchy order (h1 > ? > ? > ?)
  3. Identify missing h2 after h1
  4. Identify inconsistent jump from h3 to h2
  5. Rate both as MAJOR (not CRITICAL, since headings are semantic)
  6. Note in "What's Missing": "Consistent heading hierarchy, proper h1 > h2 > h3 progression"

  Baseline performance: Many reviewers check "are headings semantic?" (yes) and miss "is the hierarchy correct?" (no). A11y-critic should catch this via semantic structure audit phase.
