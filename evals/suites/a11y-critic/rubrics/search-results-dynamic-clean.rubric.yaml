fixture_id: search-results-dynamic-clean
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2
    note: "Penalizes false positives; rewards specificity"

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 0
    impact: "No critical a11y issues present in clean implementation"

  - category: should_find
    count: 0
    impact: "No major issues"

  - category: nice_to_find
    count: 1
    description: "Optional: result count in results heading (e.g., 'Search Results: 3 items found') for immediate context"
    impact: "Enhancement suggestion (ENHANCEMENT severity)"
    expected_to_find: "45%"

  - category: false_positive_trap
    count: 2
    items:
      - description: "aria-live='polite' is the correct choice for search results — not 'assertive'"
        impact: "Search results are not urgent; polite is the correct politeness level. Flagging it as 'should be assertive' misunderstands when assertive is appropriate."
        expected_to_find: "80%"

      - description: "Label with display:none is acceptable because input has aria-label"
        impact: "The visible <label> has display:none but the input has aria-label='Search query'. The field IS labeled. Flagging 'label hidden from screen readers' ignores the aria-label."
        expected_to_find: "75%"

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100
  where positive_weights = [must_find, should_find, nice_to_find, evidence_quality, format_compliance]
  false_positive_trap is subtracted from score if incorrectly flagged

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 90-100
    reasoning: "Should recognize correct live region implementation and avoid flagging polite vs assertive or display:none label"

  - condition: baseline-zero-shot
    expected_score: 75-90
    reasoning: "May flag aria-live='polite' as insufficient or display:none label as inaccessible"

  - condition: baseline-few-shot
    expected_score: 80-90
    reasoning: "Few-shot may help with live region politeness level judgment"

verdict_expectations:
  harsh-critic: ACCEPT
  baseline-zero-shot: ACCEPT
  baseline-few-shot: ACCEPT

notes: |
  This CLEAN fixture tests live region and dynamic content implementation.

  A11y-critic should:
  1. Verify role="status" on live region (correct)
  2. Verify aria-live="polite" (correct for search — not urgent)
  3. Verify aria-atomic="true" (correct — announce complete message)
  4. Verify conditional rendering handles all states (loading, results, no results)
  5. Acknowledge clean implementation with ACCEPT verdict
  6. NOT flag aria-live="polite" as needing "assertive"
  7. NOT flag display:none label as inaccessible (input has aria-label)

  False positive traps:
  - aria-live="polite" vs "assertive": Search results are informational, not
    urgent. assertive interrupts the current speech and would be inappropriate.
    Flagging polite as insufficient shows misunderstanding of live region
    politeness levels.
  - display:none on <label>: The CSS hides the visible label, but the input
    has aria-label="Search query" which provides the accessible name. A reviewer
    that flags "label hidden from screen readers" without checking for aria-label
    is doing surface-level attribute scanning, not semantic analysis.
