fixture_id: data-table-missing-scope
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "Column headers missing scope='col' attribute"
        severity: MAJOR
        wcag: "1.3.1 Info and Relationships"
        evidence_requirement: "file:line reference to <th> elements in <thead> (lines 12-16) lacking scope='col'"
        expected_to_find: "85%"

      - description: "Row headers missing scope='row' attribute"
        severity: MAJOR
        wcag: "1.3.1 Info and Relationships"
        evidence_requirement: "file:line reference to product name <th> elements (line 22) lacking scope='row'"
        expected_to_find: "80%"

  - category: should_find
    count: 1
    items:
      - description: "Table lacks caption or aria-label to describe purpose"
        severity: MINOR
        wcag: "1.3.1 Info and Relationships"
        evidence_requirement: "file:line reference to <table> element (line 10) lacking <caption> or aria-label"
        expected_to_find: "60%"

  - category: nice_to_find
    count: 0

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 85-100
    reasoning: "Should identify both scope issues as MAJOR and the missing caption; cite specific lines"

  - condition: baseline-zero-shot
    expected_score: 55-75
    reasoning: "May see semantic table elements and assume correctness; scope attributes are commonly overlooked"

  - condition: baseline-few-shot
    expected_score: 65-80
    reasoning: "Few-shot example of table review may prompt checking scope attributes"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests semantic completeness beyond element usage.

  The table uses correct semantic elements (<table>, <thead>, <th>, <td>)
  which creates a false sense of completeness. But scope attributes are
  missing, making cell-to-header relationships ambiguous for screen readers
  navigating with table commands.

  A11y-critic should:
  1. Verify table structure is semantic (it is — no false positives)
  2. Audit scope attributes (missing on both col and row headers)
  3. Note missing <caption> or aria-label
  4. Rate scope issues as MAJOR (not CRITICAL — basic structure is present)

  Expected baseline gap: Reviewers that check "are semantic table elements
  used?" see yes and stop. A11y-critic should verify the full semantic chain
  (element → role → scope → association).
