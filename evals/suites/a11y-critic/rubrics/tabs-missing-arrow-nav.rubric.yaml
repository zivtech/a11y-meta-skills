fixture_id: tabs-missing-arrow-nav
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 1
    items:
      - description: "Arrow key navigation not implemented for tab cycling"
        severity: MAJOR
        wcag: "2.1.1 Keyboard"
        apa_pattern: "WAI-ARIA Tabs Pattern"
        evidence_requirement: "file:line reference to handleTabKeyDown (lines 10-15) showing only Enter/Space handling"
        expected_to_find: "90%"

  - category: should_find
    count: 1
    items:
      - description: "Active tab not focused after keyboard selection"
        severity: MINOR
        wcag: "2.1.1 Keyboard + 4.1.2 Name, Role, Value"
        evidence_requirement: "file:line reference to setActiveTab (line 32) showing no focus management"
        expected_to_find: "55%"

  - category: nice_to_find
    count: 0

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 90-100
    reasoning: "Should identify missing arrow key navigation as MAJOR, cross-reference WAI-ARIA Tabs pattern, and cite handleTabKeyDown"

  - condition: baseline-zero-shot
    expected_score: 55-75
    reasoning: "May verify ARIA attributes are correct (they are) and miss the keyboard interaction gap"

  - condition: baseline-few-shot
    expected_score: 65-80
    reasoning: "Few-shot example with keyboard interaction may prompt checking arrow key handling"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests pattern completeness, not attribute presence.

  Key distinction: The ARIA is correct (role="tablist", role="tab", aria-selected,
  aria-controls, roving tabindex). But the keyboard pattern is incomplete per the
  published WAI-ARIA Tabs pattern — arrow keys are not handled.

  This is a common issue: developers add ARIA correctly but forget the keyboard
  interaction contract. A11y-critic should go beyond "is ARIA present?" to
  "is the full interaction pattern implemented?"

  Expected baseline gap: Generic reviewers check attribute presence and see
  everything looks correct. A11y-critic should cross-reference against the
  WAI-ARIA Tabs pattern and identify the missing keyboard interaction.
