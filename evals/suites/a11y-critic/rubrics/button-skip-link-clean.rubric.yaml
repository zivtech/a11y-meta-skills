# Calibration note (2026-07-16): until this date the fixture had no blind cut line, so
# every model prompt included its Difficulty Level / Notes sections — i.e. the expected
# CLEAN verdict and grading guidance were visible to the model. expected_to_find rates
# and expected_reviewer_performance bands predate the cut-line fix and await blind
# re-norming. See the scoring changelog in ollama/BENCHMARK.md.

fixture_id: button-skip-link-clean
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2
    note: "Penalizes false positives; rewards specificity"

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 0
    impact: "No critical a11y issues present in clean implementation"

  - category: should_find
    count: 0
    impact: "No major issues"

  - category: nice_to_find
    count: 1
    description: "Optional: aria-current='page' on current navigation link for better page indication"
    impact: "Enhancement suggestion (ENHANCEMENT severity)"
    expected_to_find: "50%"

  - category: false_positive_trap
    count: 1
    items:
      - description: "Visually-hidden skip link (position: absolute; top: -40px) is correct — not a hidden/invisible element issue"
        impact: "Skip link is intentionally off-screen and revealed on focus. Flagging it as 'hidden from users' or 'inaccessible' is a false positive."
        expected_to_find: "90%"

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100
  where positive_weights = [must_find, should_find, nice_to_find, evidence_quality, format_compliance]
  false_positive_trap is subtracted from score if incorrectly flagged

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 95-100
    reasoning: "Should recognize complete skip link + landmark implementation and avoid flagging off-screen positioning"

  - condition: baseline-zero-shot
    expected_score: 85-95
    reasoning: "May note enhancement but should recognize clean implementation"

  - condition: baseline-few-shot
    expected_score: 85-95
    reasoning: "Same as zero-shot; few-shot doesn't add much for clean fixtures"

verdict_expectations:
  harsh-critic: ACCEPT
  baseline-zero-shot: ACCEPT
  baseline-few-shot: ACCEPT

notes: |
  This CLEAN fixture tests baseline truthfulness for focus management
  and keyboard navigation.

  A11y-critic should:
  1. Verify skip link is present and functional (href="#main-content")
  2. Verify skip link is hidden off-screen, revealed on :focus
  3. Verify landmark regions (nav, main, footer) are present
  4. Verify navigation has aria-label
  5. Verify list semantics for navigation links
  6. Acknowledge clean implementation with ACCEPT verdict
  7. NOT flag the off-screen skip link as a hidden/inaccessible element

  False positive trap: The skip link uses position: absolute + top: -40px
  to hide it off-screen, then reveals it with top: 0 on :focus. This is
  the standard skip-link pattern per WCAG 2.4.1. Flagging it as "element
  hidden from users" or "skip link not visible" misunderstands the pattern.
