fixture_id: loading-state-missing-aria-busy
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "Loading state not communicated via aria-busy"
        severity: CRITICAL
        wcag: "4.1.3 Status Messages"
        evidence_requirement: "file:line reference to data-container div (lines 6-18) lacking aria-busy attribute"
        expected_to_find: "85%"

      - description: "Loading message not announced as live region"
        severity: MAJOR
        wcag: "4.1.3 Status Messages"
        evidence_requirement: "file:line reference to loading-spinner div (lines 14-18) lacking aria-live or role='status'"
        expected_to_find: "80%"

  - category: should_find
    count: 0

  - category: nice_to_find
    count: 0

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 85-100
    reasoning: "Should identify both aria-busy and live region gaps with correct severity levels and evidence"

  - condition: baseline-zero-shot
    expected_score: 55-75
    reasoning: "May notice the visual spinner but miss the programmatic announcement gap; aria-busy is less commonly known"

  - condition: baseline-few-shot
    expected_score: 65-80
    reasoning: "Few-shot example of dynamic content may prompt checking for aria-live regions"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests state communication for dynamic content.

  Screen reader users don't know content is loading. They hear the
  "Results" heading immediately (before data loads), then content appears
  after 2 seconds with no announcement. The visual spinner is an animation
  that screen readers cannot perceive.

  Two separate gaps:
  1. aria-busy: The container should signal that its content is updating.
     Without aria-busy='true', screen readers may read stale or partial
     content during the loading period.
  2. Live region: The loading status message ("Loading...") should be
     announced. Without role='status' or aria-live, it renders silently.

  A11y-critic should rate aria-busy as CRITICAL (data integrity — user
  may act on stale content) and live region as MAJOR (user awareness).
