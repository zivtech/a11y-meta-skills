fixture_id: form-validation-missing-aria-describedby
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "Error messages not associated with form inputs via aria-describedby"
        severity: CRITICAL
        wcag: "1.3.1 Info and Relationships + 4.1.2 Name, Role, Value"
        evidence_requirement: "file:line reference to input elements missing aria-describedby (lines 69-79)"
        expected_to_find: "90%"

      - description: "Error summary not announced as dynamic content update"
        severity: MAJOR
        wcag: "4.1.3 Status Messages"
        evidence_requirement: "file:line reference to error summary div (lines 19-26) lacking role='alert' or aria-live"
        expected_to_find: "85%"

  - category: should_find
    count: 1
    items:
      - description: "Error summary list items not linked to associated fields for direct navigation"
        severity: MINOR
        wcag: "3.3.4 Error Prevention"
        expected_to_find: "45%"

  - category: nice_to_find
    count: 0

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 90-100
    reasoning: "Should identify both must-find issues with correct severity (CRITICAL for aria-describedby, MAJOR for live region) and cite evidence"

  - condition: baseline-zero-shot
    expected_score: 60-80
    reasoning: "May notice aria-invalid is set but miss aria-describedby gap; may catch live region issue but provide weaker evidence"

  - condition: baseline-few-shot
    expected_score: 70-85
    reasoning: "Few-shot example of form validation may help recognize the aria-describedby pattern"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests semantic relationships in form validation,
  not just visual presentation.

  Key distinction: The visual design is correct — errors display prominently.
  But the programmatic relationships are missing:
  1. Error messages not linked to fields (aria-describedby)
  2. Error summary not announced as dynamic content (aria-live/role='alert')

  This is realistic and common: developers focus on visual accessibility but
  miss the semantic layer.

  A11y-critic should:
  1. Note error summary should have role='alert' or aria-live='assertive'
  2. Verify aria-describedby is missing from all inputs with errors
  3. Suggest adding id attributes to error message elements
  4. Rate as CRITICAL + MAJOR (two separate severity levels)
  5. Correctly distinguish visual correctness from programmatic correctness

  Expected baseline gap: Baseline might notice aria-invalid is set and assume
  the form is properly connected. A11y-critic should verify the full chain
  (label → input → error description → live announcement).
