stage_notes: |
  ALL-LOW never-escalate probe (plan 011) — the S4 branch every existing fixture leaves
  unprobed (each "clean" fixture keeps cognitive_neurodivergent at MEDIUM, so it must still
  escalate). This is the only fixture whose CORRECT outcome is "do not escalate at all."

  Chain-native: authored directly under targets/ + rubrics/, with no source in the
  perspectives or a11y-critic suites, so re-running extract_targets.py leaves it untouched
  and the other suites' fixture counts (33 / 25 / 25) are unaffected.

  Correct chain behavior: a ground-truth-matching critic flags NOTHING at MEDIUM/HIGH, so the
  orchestrator must NOT spawn perspective-audit. S4 = 1 iff escalated == false. An escalation
  here is a candidate over-escalation — but because the critic reviews the planner's PLAN (not
  just this clean component), it may be a defensible plan-level concern rather than a true
  false-positive. Per s4_observational (M1, plan 011) the scorer REPORTS the mismatch for human
  review instead of auto-failing it; only a human can tell false-positive from defensible
  concern. S3 (alarm calibration) should be high: all seven perspectives are genuinely LOW.

  Textbook-correct breadcrumb (WAI-ARIA APG): <nav aria-label="Breadcrumb"> + <ol> + ancestor
  links + aria-current="page" on the final item, rendered as a non-link <span>.

  False positive traps: CSS "/" separators via ::after are decorative (acceptable, NOT a
  missing text-alternative bug); aria-current="page" on a <span> is correct; no heading inside
  <nav> is required when aria-label is present; link contrast (#1a4f8b on white) is ~7:1.

  Acceptable critic verdict: ACCEPT.
