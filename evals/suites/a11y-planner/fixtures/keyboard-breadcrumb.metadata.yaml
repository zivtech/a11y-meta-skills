fixture_id: keyboard-breadcrumb
name: Breadcrumb Navigation
description: Breadcrumb showing page hierarchy (Home > Products > Electronics > Laptops). Plan semantic nav/ol/li structure, aria-current='page' for current item, link text clarity, Tab order, visual separators hidden from screen readers, and WCAG citations.
language: html
framework: None
difficulty: TRIVIAL
domain: Keyboard Navigation Design
work_type: component_plan
risk_level: Low

scenario:
  feature: Reusable breadcrumb navigation component for an e-commerce site showing the current page hierarchy — e.g., Home > Products > Electronics > Laptops (current page). Each item except the last is a navigable link. The last item (current page) is static text, not a link. Arrow separators (›) between items are visual-only. Component supports variable depth from 2 to 5 levels.
  user_need: Screen reader users need the breadcrumb announced as a navigation landmark, the current page identified programmatically (aria-current="page"), and separators excluded from the reading flow. Keyboard-only users need each link focusable with a clear focus indicator and logical Tab order.
  compliance_target: WCAG 2.2 AA
  assistive_technologies:
    - NVDA (Windows)
    - JAWS (Windows)
    - VoiceOver (macOS)
    - Keyboard-only users
  scope: Single breadcrumb component — landmark structure, list semantics, aria-current, link text strategy, separator hiding, focus indicator, tab order; excludes dynamic updates or AJAX-loaded breadcrumb changes
  constraints:
    - Variable depth (2-5 levels) — plan must handle both short and long paths
    - Visual separators (›, /, » ) are decorative CSS content — must not be read by screen readers
    - Current page item is not a link (static text)

expected_plan_sections:
  - Scope & Context
  - Semantic Structure (nav, ol, li)
  - aria-current="page" Implementation
  - Link Text Strategy
  - Tab Order
  - Visual Accessibility (separators, focus indicator)
  - Testing Strategy

key_evaluation_criteria:
  - Semantic nav element with aria-label="Breadcrumb" to disambiguate from other nav regions
  - Ordered list (ol) structure with li items — not ul or div
  - aria-current="page" on the last (current) item's element
  - Link text clarity: descriptive page names, not "click here" or "go to"
  - Visual separators as CSS content (::after or ::before) or aria-hidden spans — not read by SR
  - WCAG 1.3.1 (Info and Relationships) citation for semantic structure
  - WCAG 2.4.1 (Bypass Blocks) not applicable (breadcrumb is not a bypass mechanism)

expected_findings:
  must_have:
    - "Semantic `<nav>` element with aria-label='Breadcrumb' (disambiguates from site nav)"
    - "Ordered list `<ol>` with `<li>` items — ol communicates sequential/hierarchical relationship"
    - "aria-current='page' on the current page item (last breadcrumb item)"
    - "Current page item is not wrapped in `<a>` — static text or `<span>` only"
    - "WCAG 1.3.1 (Info and Relationships) citation"

  should_have:
    - "Visual separator hiding strategy: CSS content property (::after/::before) or aria-hidden='true' on separator elements"
    - "Link text strategy: use page title/name directly (e.g., 'Electronics'), not generic labels"
    - "Tab order documentation: only linked items receive Tab focus; current page item is skipped (not a link)"
    - "Focus indicator specification: 3:1 contrast minimum on focused links"
    - "WCAG 2.4.4 (Link Purpose in Context) — link text alone should identify the destination"

  nice_to_have:
    - "WCAG 2.4.8 (Location) — breadcrumb as one way to communicate current location within a set of pages"
    - "APG Breadcrumb Example reference: https://www.w3.org/WAI/ARIA/apg/patterns/breadcrumb/"
    - "Variable depth handling: plan remains valid for 2-item and 5-item breadcrumbs"
    - "Structured data (schema.org BreadcrumbList) as enhancement for SEO and rich results — note as out of scope for a11y plan"
    - "Truncation strategy for deep breadcrumbs at narrow viewports — show last 2-3 items, hide middle with accessible expand"

false_positive_traps:
  - "Using `<ul>` instead of `<ol>` — while browsers treat them similarly for AT, `<ol>` conveys ordered sequential hierarchy more accurately for breadcrumbs; the APG example uses `<ol>`"
  - "Adding role='navigation' to the `<nav>` element — redundant; `<nav>` already has implicit navigation role"
  - "Applying aria-current='true' instead of aria-current='page' — 'page' is the correct token for current page location"
  - "Making the current page item a link to itself — current page breadcrumb item should not be a link (it's where the user already is)"
  - "Recommending aria-label='breadcrumb navigation' with redundant 'navigation' in the label — screen readers already announce the role; 'Breadcrumb' alone is sufficient"
  - "Adding tabindex='0' to the static current page item — it's not interactive; it should not receive focus"

multi_perspective_coverage:
  keyboard: "Only linked items (Home, Products, Electronics) receive Tab focus — in left-to-right DOM order. The current page item (Laptops) is not focusable. Each focused link has a visible focus indicator meeting 3:1 contrast. No keyboard traps. Tab moves out of the breadcrumb to next focusable element after the last link."
  screen_reader: "NVDA/JAWS announce the `<nav>` as 'Breadcrumb navigation' landmark. `<ol>` announces item count ('list of 4 items'). Each `<li>` and link is read sequentially. CSS separator content (::after) is not announced. aria-current='page' causes NVDA to announce 'Laptops, current page'. VoiceOver reads 'Laptops, current page, group item 4 of 4'."
  low_vision: "Focus indicators on links visible at 200% zoom (3:1 contrast). Separator characters remain visible at large text sizes. Breadcrumb does not clip or overflow at narrow widths — wraps to new line. Link color meets 3:1 contrast against background (WCAG 1.4.3)."
  cognitive: "Breadcrumb provides wayfinding context with minimal cognitive overhead. Simple linear structure. Page names are the link labels — no abstract or generic text. Consistent position (below site header) reduces disorientation."
  mobile_touch: "Link touch targets meet 44×44px minimum. Sufficient spacing between breadcrumb items for accurate tapping. Horizontal scrolling acceptable on deep breadcrumbs if vertical stacking is unavailable — ensure scroll is visible."

notes: |
  TRIVIAL fixture — evaluation focus is on precise semantic choices (nav/ol/li) and constraint handling (separator hiding, current page non-link), not ARIA complexity.

  The fixture's three discriminating items:
  1. aria-label="Breadcrumb" on the nav element — pages often have multiple `<nav>` elements (site nav, breadcrumb, pagination). The aria-label distinguishes them in the landmarks list.
  2. aria-current="page" vs aria-current="true" — "true" is valid ARIA but not meaningful for page location. "page" is the correct token and produces better AT announcements.
  3. Separator hiding — plans that say "hide separators" without specifying CSS content property vs aria-hidden span vs Unicode character are incomplete. The mechanism matters because CSS content is already not announced by most AT, but span elements require aria-hidden.

  The difficulty is noted as TRIVIAL in the fixture metadata. The rubric notes MODERATE — this is a documentation inconsistency; do not attempt to reconcile. Evaluate as TRIVIAL.

  Expected verdict: ACCEPT for all three conditions (TRIVIAL).

  Outlier indicators (flag for review):
  - `<ul>` used without justification over `<ol>`
  - Current page item is a link to itself
  - No aria-current attribute
  - aria-label missing from nav (ambiguous with other nav landmarks)
  - Separator characters read aloud to screen reader users
  - Plan >3 pages (scope creep for TRIVIAL)

scoring_keywords:
  "Semantic `<nav>` element with aria-label='Breadcrumb' (disambiguates from site nav)":
    - "aria-label=\"Breadcrumb\""
    - "aria-label='Breadcrumb'"
    - "<nav"
  "Ordered list `<ol>` with `<li>` items — ol communicates sequential/hierarchical relationship":
    - "<ol"
    - "ordered list"
  "aria-current='page' on the current page item (last breadcrumb item)":
    - "aria-current=\"page\""
    - "aria-current='page'"
    - "aria-current"
  "Current page item is not wrapped in `<a>` — static text or `<span>` only":  # weak-match criterion
    - "not a link"
    - "<span"
    - "static text"
    - "not wrapped"
  "WCAG 1.3.1 (Info and Relationships) citation":
    - "1.3.1"
