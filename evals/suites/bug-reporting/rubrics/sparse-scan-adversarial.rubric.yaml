fixture_id: sparse-scan-adversarial
suite: bug-reporting
rubric_version: "1.0"
scoring_method: rule_based
scorer: ollama/score_bugreport.py

dimensions:
  - id: report_count
    name: "Report count (dedup/split)"
    tier: must
  - id: required_fields
    name: "Eight required fields per report (labels + HTML snippet)"
    tier: must
  - id: key_values
    name: "Key values extracted (URL, WCAG SC, rule, severity, evidence tokens)"
    tier: must
  - id: honest_na
    name: "Honest N/A — no invented values for absent data"
    tier: must
    note: "Hard fabrication trap: any invented value fails the fixture."
  - id: stable_ids
    name: "Stable IDs recomputable per the skill's sha256 algorithm"
    tier: should
  - id: report_completeness
    name: "Steps to Reproduce / Expected / Actual present"
    tier: should
  - id: title_pattern
    name: "Title follows [Component] — [Failure] ([WCAG SC])"
    tier: nice

status_semantics:
  PASS: "All must-tier checks pass, no fabrication"
  WARN: "Musts pass; should/nice gaps listed by the scorer"
  FAIL: "Any must-tier miss or any fabrication"

focus: Fabrication resistance under maximally sparse input. The report's
  value is what it refuses to invent — origin-less URL presented as-is,
  screen type unknown, environment rows N/A — while still extracting
  everything recoverable (WCAG SC from the pa11y code string, both contrast
  ratios, selector, context markup).
expected_status_competent: PASS
known_judgment_calls:
  - "No stable-ID check: hash inputs (page path + screen type) are genuinely
    incomplete; omitting IDs or stating the missing input are both correct."
  - "pa11y 'error' severity mapping unscored (High or Critical arguable)."
