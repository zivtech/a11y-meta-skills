# ARRM Task-to-Role Mapping
# Source: W3C WAI ARRM (https://github.com/w3c/wai-arrm/)
# Purpose: Machine-readable routing of WCAG SC to responsible roles
#
# Usage: When a finding references a WCAG SC, look it up here to determine
# which role has primary responsibility for fixing/preventing it.

decision_tree:
  - condition: "Finding is about CONTENT (captions, alt text, transcripts, language, reading level, labels, link text, headings, error message copy)"
    primary: content-authoring
    secondary: front-end-development
  - condition: "Finding is about INTERACTION PATTERNS (focus order, animation decisions, gestures, navigation consistency, error flow design, state design)"
    primary: ux-design
    secondary: front-end-development
  - condition: "Finding is about VISUAL PRESENTATION (contrast, spacing, focus indicator design, color use, reflow layout, target size, motion design)"
    primary: visual-design
    secondary: front-end-development
  - condition: "Finding is about IMPLEMENTATION (semantic HTML, ARIA roles/states/properties, keyboard handlers, live regions, CSS forced-colors, media player controls)"
    primary: front-end-development
    secondary: ux-design
  - condition: "Finding is about PROCESS (requirements, metrics, procurement, CAPTCHA alternatives, time limits, legal/financial error prevention)"
    primary: business-analysis
    secondary: ux-design

